<!-- ================= MAIN LAYOUT ================= -->
<div class="dashboard-layout">

  <!-- SIDEBAR -->
  <app-admin-sidebar></app-admin-sidebar>


  <!-- MAIN CONTENT -->
  <main class="main-content">

    <div class="form-container">

      <div class="doctor-form-card">

        <h2>Add Doctor</h2>

        <form (ngSubmit)="onSubmit()">

          <div class="form-grid">

            <div class="form-group">
              <label>Doctor Name</label>
              <input type="text"
                     [(ngModel)]="doctor.name"
                     name="name"
                     required>
            </div>

            <div class="form-group">
              <label>Department</label>
              <input type="text"
                     [(ngModel)]="doctor.department"
                     name="department"
                     required>
            </div>

            <div class="form-group">
              <label>Experience (Years)</label>
              <input type="number"
                     [(ngModel)]="doctor.experience"
                     name="experience"
                     required
                     min="0">
            </div>

            <div class="form-group">
              <label>Email</label>
              <input type="email"
                     [(ngModel)]="doctor.email"
                     name="email"
                     required>
            </div>

            <div class="form-group">
              <label>Qualification</label>
              <input type="text"
                     [(ngModel)]="doctor.qualification"
                     name="qualification"
                     required>
            </div>

            <div class="form-group">
              <label>Password</label>
              <input type="password"
                     [(ngModel)]="doctor.password"
                     name="password"
                     required>
            </div>

            <div class="form-group">
              <label>Profile Image URL</label>
              <input type="text"
                     [(ngModel)]="doctor.image"
                     name="image"
                     placeholder="https://example.com/doctor.jpg">
            </div>

          </div>

          <div class="form-actions">
            <button type="submit" class="save-btn">
              Save Doctor
            </button>
          </div>

        </form>

      </div>

    </div>

  </main>

</div>
