<div class="reset-container">
  <div class="reset-card">
    <div class="reset-header">
      <div class="logo">
        <span class="logo-icon">⦿</span>
        <span class="logo-text">ProHealth</span>
      </div>
      <h2>Set New Password</h2>
      <p>Configure a strong password to protect your user credentials</p>
    </div>

    <!-- Alerts -->
    <div class="alert alert-success" *ngIf="successMessage">
      <i class="fa-solid fa-circle-check"></i> {{ successMessage }}
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="reset-form" *ngIf="!successMessage">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email" 
            name="email" 
            required 
            placeholder="yourname@example.com"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input 
            type="password" 
            id="newPassword" 
            [(ngModel)]="newPassword" 
            name="newPassword" 
            required 
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-shield-halved"></i>
          <input 
            type="password" 
            id="confirmPassword" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            required 
            placeholder="••••••••"
          />
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Update Password</span>
        <span *ngIf="isLoading" class="spinner-small"></span>
      </button>
    </form>

    <div class="reset-footer">
      <a routerLink="/login" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Cancel and Back
      </a>
    </div>
  </div>
</div>
