<div class="forgot-container">
  <div class="forgot-card">
    <div class="forgot-header">
      <div class="logo">
        <span class="logo-icon">⦿</span>
        <span class="logo-text">ProHealth</span>
      </div>
      <h2>Reset Your Password</h2>
      <p>Enter your email address and we'll send you a password reset code</p>
    </div>

    <!-- Alerts -->
    <div class="alert alert-success" *ngIf="successMessage">
      <i class="fa-solid fa-circle-check"></i> {{ successMessage }}
    </div>

    <div class="alert alert-danger" *ngIf="errorMessage">
      <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="forgot-form" *ngIf="!successMessage">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            [(ngModel)]="email" 
            name="email" 
            required 
            placeholder="yourname@example.com"
          />
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Send Code</span>
        <span *ngIf="isLoading" class="spinner-small"></span>
      </button>
    </form>

    <div class="forgot-footer">
      <a routerLink="/login" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </div>
</div>
