<div class="unauth-container">
  <div class="unauth-card">
    <div class="shield-icon">
      <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    
    <h1>Access Denied</h1>
    <p class="error-code">Error Code: 403 • Forbidden</p>
    
    <p class="error-desc">
      You do not have the required permissions or security clearance to access this department or resource. 
      Please contact ProHealth administration if you believe this is an error.
    </p>
    
    <div class="action-buttons">
      <button (click)="goBack()" class="btn btn-primary">
        <i class="fa-solid fa-house"></i> Return Home
      </button>
      <a routerLink="/login" class="btn btn-secondary">
        <i class="fa-solid fa-key"></i> Log In
      </a>
    </div>
  </div>
</div>
