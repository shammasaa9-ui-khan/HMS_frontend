<app-main-navbar></app-main-navbar>
<br><br><br><br><br><br>

<div class="cc">
  <div class="subtitle">OUR DOCTORS</div>
  <h1>Meet Our Doctors</h1>
</div>

<div class="doctor-carousel-container">
<button class="slider-btn prev" (click)="scrollLeft()">
  <i class="fa-solid fa-chevron-left"></i>
</button>

  <div class="doctor-list" #doctorContainer>
    <div
      class="doctor-card"
      *ngFor="let doctor of doctors"
      (click)="viewDoctor(doctor._id)"
    >
      <div class="doctor-image-container">
        <img
          [src]="doctor.image"
          [alt]="doctor.name"
          class="doctor-img"
          (error)="onImageError($event)"
        />
      </div>

      <div class="doctor-info">
        <h3 class="doctor-name">{{ doctor.name }}</h3>
        <p class="doctor-specialty">
          {{ doctor.position || doctor.specialization || 'Doctor' }}
        </p>
      </div>
    </div>
  </div>

  <button class="slider-btn next" (click)="scrollRight()">
  <i class="fa-solid fa-chevron-right"></i>
</button>
</div>
